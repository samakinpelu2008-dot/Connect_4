<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYRIX CONNECT_4</title>
    <style>
        :root {
            --bg: #05070a; --panel: #111827; --red: #ff4757; --yellow: #eccc68; --blue: #00d2ff;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        #lobby, #game-screen { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        .menu-card {
            background: var(--panel); padding: 30px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); text-align: center; width: 100%; max-width: 350px;
        }
        button, select { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; 
            border: none; font-weight: bold; cursor: pointer; 
        }
        .btn-primary { background: var(--blue); color: #000; }
        .mode-btn { background: #374151; color: white; border: 2px solid transparent; }
        .mode-btn.active { border-color: var(--blue); }
        
        .stats { display: flex; gap: 20px; margin-bottom: 15px; }
        .score-box { padding: 8px 15px; border-radius: 10px; background: #1f2937; font-weight: bold; }
        
        .board-wrapper {
            position: relative; width: 95vw; max-width: 400px; aspect-ratio: 7/6;
            background: #1e293b; padding: 8px; border-radius: 12px;
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
        }
        .slot { 
            width: 100%; aspect-ratio: 1/1; background: #0f172a; 
            border-radius: 50%; position: relative; 
        }
        .disc {
            width: 100%; height: 100%; border-radius: 50%; position: absolute;
            transform: translateY(-600%); transition: transform 0.4s cubic-bezier(0.47, 0, 0.74, 0.71);
        }
        .disc.dropped { transform: translateY(0); }
        .p1 { background: var(--red); box-shadow: 0 0 15px var(--red); }
        .p2 { background: var(--yellow); box-shadow: 0 0 15px var(--yellow); }

        #win-line-svg {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
        }
        line { stroke: white; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 0.6s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="menu-card">
            <h1 style="color:var(--blue)">NEON 4</h1>
            <button class="mode-btn active" onclick="setMode('pvp', this)">2 PLAYERS</button>
            <button class="mode-btn" onclick="setMode('pvc', this)">VS COMPUTER</button>
            <p>Match Length</p>
            <select id="rounds">
                <option value="1">1 Round</option><option value="3">3 Rounds</option>
                <option value="5">5 Rounds</option><option value="11">11 Rounds</option>
            </select>
            <button class="btn-primary" onclick="startGame()">PLAY NOW</button>
        </div>
    </div>

    <div id="game-screen" style="display:none">
        <div class="stats">
            <div class="score-box" id="s1" style="color:var(--red)">P1: 0</div>
            <div class="score-box" id="s2" style="color:var(--yellow)">P2: 0</div>
        </div>
        <div id="status" style="margin-bottom:10px; font-weight:bold">RED'S TURN</div>
        <div class="board-wrapper" id="board-ui">
            <svg id="win-line-svg"></svg>
        </div>
        <button style="width:auto; margin-top:20px; background:#374151; color:white" onclick="location.reload()">MAIN MENU</button>
    </div>

<script>
    let mode = 'pvp', maxRounds = 1, scores = {p1:0, p2:0};
    let currentPlayer = 1, board = [], gameActive = false;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function setMode(m, btn) {
        mode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function startGame() {
        maxRounds = parseInt(document.getElementById('rounds').value);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        initMatch();
    }

    function initMatch() {
        board = Array(6).fill().map(() => Array(7).fill(0));
        currentPlayer = 1; gameActive = true;
        const ui = document.getElementById('board-ui');
        ui.innerHTML = '<svg id="win-line-svg"></svg>';
        for(let r=0; r<6; r++) {
            for(let c=0; c<7; c++) {
                const s = document.createElement('div');
                s.className = 'slot'; s.id = `r${r}c${c}`;
                s.onclick = () => handleMove(c);
                ui.appendChild(s);
            }
        }
        updateStatus();
    }

    function handleMove(c) {
        if(!gameActive || (mode==='pvc' && currentPlayer===2)) return;
        executeMove(c);
    }

    function executeMove(c) {
        for(let r=5; r>=0; r--) {
            if(board[r][c] === 0) {
                board[r][c] = currentPlayer;
                renderDisc(r, c);
                beep(200 + (r*40), 'sine');

                const winPath = checkWin(r, c);
                if(winPath) {
                    processWin(winPath);
                } else if(board.flat().every(v => v !== 0)) {
                    alert("Draw!"); initMatch();
                } else {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateStatus();
                    if(mode==='pvc' && currentPlayer===2) setTimeout(cpuLogic, 600);
                }
                return;
            }
        }
    }

    function renderDisc(r, c) {
        const disc = document.createElement('div');
        disc.className = `disc ${currentPlayer===1 ? 'p1' : 'p2'}`;
        document.getElementById(`r${r}c${c}`).appendChild(disc);
        setTimeout(() => disc.classList.add('dropped'), 10);
    }

    function checkWin(r, c) {
        const p = board[r][c];
        const directions = [[0,1],[1,0],[1,1],[1,-1]]; // Horizontal, Vertical, Diagonals
        for(let [dr, dc] of directions) {
            let path = [[r, c]];
            [[dr,dc], [-dr,-dc]].forEach(([sr, sc]) => {
                let nr = r + sr, nc = c + sc;
                while(nr>=0 && nr<6 && nc>=0 && nc<7 && board[nr][nc] === p) {
                    path.push([nr, nc]);
                    nr += sr; nc += sc;
                }
            });
            if(path.length >= 4) return path;
        }
        return null;
    }

    function cpuLogic() {
        // Simple AI: 1. Try to win, 2. Try to block player, 3. Random
        const getValidCols = () => [0,1,2,3,4,5,6].filter(c => board[0][c] === 0);
        const valid = getValidCols();
        let chosen = valid[Math.floor(Math.random()*valid.length)];
        
        // Blocking logic (Simplified)
        for(let c of valid) {
            for(let r=5; r>=0; r--) {
                if(board[r][c] === 0) {
                    board[r][c] = 1; // Test player win
                    if(checkWin(r, c)) chosen = c;
                    board[r][c] = 0; break;
                }
            }
        }
        executeMove(chosen);
    }

    function processWin(path) {
        gameActive = false;
        const winner = currentPlayer === 1 ? 'p1' : 'p2';
        scores[winner]++;
        document.getElementById(currentPlayer===1 ? 's1' : 's2').innerText = `${currentPlayer===1?'P1':'P2'}: ${scores[winner]}`;
        drawWinLine(path);
        beep(400, 'square'); setTimeout(() => beep(600, 'square'), 150);

        setTimeout(() => {
            if(scores[winner] >= Math.ceil(maxRounds/2)) {
                alert(`PLAYER ${currentPlayer} WINS THE MATCH!`);
                location.reload();
            } else { initMatch(); }
        }, 1600);
    }

    function drawWinLine(path) {
        const svg = document.getElementById('win-line-svg');
        const bRect = document.getElementById('board-ui').getBoundingClientRect();
        const start = document.getElementById(`r${path[0][0]}c${path[0][1]}`).getBoundingClientRect();
        const end = document.getElementById(`r${path[path.length-1][0]}c${path[path.length-1][1]}`).getBoundingClientRect();
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", start.left + start.width/2 - bRect.left);
        line.setAttribute("y1", start.top + start.height/2 - bRect.top);
        line.setAttribute("x2", end.left + end.width/2 - bRect.left);
        line.setAttribute("y2", end.top + end.height/2 - bRect.top);
        svg.appendChild(line);
    }

    function updateStatus() {
        const s = document.getElementById('status');
        s.innerText = currentPlayer === 1 ? "RED'S TURN" : "YELLOW'S TURN";
        s.style.color = currentPlayer === 1 ? 'var(--red)' : 'var(--yellow)';
    }

    function beep(f, t) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
    }
</script>
</body>
</html>
